{% extends "base.html" %}
{% block title %}Login — Castaway{% endblock %}

{% block fullpage %}
<div class="min-h-screen flex items-center justify-center bg-slate-950">
    <div class="w-full max-w-sm">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-white">Castaway</h1>
            <p class="text-sm text-slate-500 mt-1">SSH Session Manager</p>
        </div>
        <div class="bg-slate-900 rounded-xl border border-slate-800 p-6">
            <h2 class="text-lg font-semibold text-white mb-4">Sign in</h2>
            <div id="error" class="hidden mb-4 p-3 rounded-lg bg-red-500/10 border border-red-500/20 text-red-400 text-sm"></div>
            <form id="loginForm" class="space-y-4">
                <div>
                    <label class="block text-sm text-slate-400 mb-1">Username</label>
                    <input type="text" name="username" required autofocus
                        class="w-full px-3 py-2 bg-slate-800 border border-slate-700 rounded-lg text-white placeholder-slate-500 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500">
                </div>
                <div>
                    <label class="block text-sm text-slate-400 mb-1">Password</label>
                    <input type="password" name="password" required
                        class="w-full px-3 py-2 bg-slate-800 border border-slate-700 rounded-lg text-white placeholder-slate-500 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500">
                </div>
                <button type="submit"
                    class="w-full py-2 px-4 bg-blue-600 hover:bg-blue-500 text-white rounded-lg font-medium transition-colors">
                    Sign in
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script nonce="{{ request.state.csp_nonce }}">
document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const form = e.target;
    const error = document.getElementById('error');
    error.classList.add('hidden');

    const res = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            username: form.username.value,
            password: form.password.value,
        }),
    });
    const data = await res.json();
    if (data.ok) {
        window.location.href = '/connections';
    } else {
        error.textContent = data.error || 'Login failed';
        error.classList.remove('hidden');
    }
});
</script>
{% endblock %}
