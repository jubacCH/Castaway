{% extends "base.html" %}
{% block title %}Users — Castaway{% endblock %}

{% block topbar_left %}
<span class="material-symbols-outlined text-blue-400 text-xl">group</span>
<h1 class="text-white font-headline font-semibold text-base">Users</h1>
<span class="text-xs text-slate-500 font-label">Manage user accounts</span>
{% endblock %}

{% block topbar_right %}
<button onclick="showAddForm()" class="px-3 py-1.5 bg-blue-600 hover:bg-blue-500 text-white rounded-lg text-sm font-semibold transition-colors active:scale-95 flex items-center gap-1.5">
    <span class="material-symbols-outlined text-sm">person_add</span> Add User
</button>
{% endblock %}

{% block content %}
<div class="p-6 max-w-3xl space-y-6">

    <!-- Add/Edit Form (hidden by default) -->
    <div id="userForm" class="hidden bg-slate-900/40 border border-slate-800 rounded-xl p-6">
        <h3 class="text-sm font-bold text-slate-300 uppercase tracking-wider font-label mb-5" id="formTitle">Add User</h3>
        <div id="formError" class="hidden mb-4 p-3 rounded-lg bg-red-500/10 border border-red-500/20 text-red-400 text-sm"></div>
        <form id="uForm" class="space-y-5">
            <input type="hidden" name="user_id" value="">
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs text-slate-400 mb-1.5 font-label">Username</label>
                    <input type="text" name="username" required
                        class="w-full px-3 py-2 bg-slate-800/50 border border-slate-700 rounded-lg text-white text-sm focus:outline-none focus:ring-1 focus:ring-blue-500">
                </div>
                <div>
                    <label class="block text-xs text-slate-400 mb-1.5 font-label">Password</label>
                    <input type="password" name="password" minlength="8"
                        class="w-full px-3 py-2 bg-slate-800/50 border border-slate-700 rounded-lg text-white text-sm focus:outline-none focus:ring-1 focus:ring-blue-500">
                </div>
                <div>
                    <label class="block text-xs text-slate-400 mb-1.5 font-label">Email</label>
                    <input type="email" name="email"
                        class="w-full px-3 py-2 bg-slate-800/50 border border-slate-700 rounded-lg text-white text-sm focus:outline-none focus:ring-1 focus:ring-blue-500">
                </div>
                <div>
                    <label class="block text-xs text-slate-400 mb-1.5 font-label">Role</label>
                    <select name="role"
                        class="w-full px-3 py-2 bg-slate-800/50 border border-slate-700 rounded-lg text-white text-sm focus:outline-none focus:ring-1 focus:ring-blue-500">
                        <option value="user">User</option>
                        <option value="admin">Admin</option>
                    </select>
                </div>
            </div>
            <div class="flex gap-2">
                <button type="submit" class="px-4 py-2 bg-blue-600 hover:bg-blue-500 text-white rounded-lg text-sm font-semibold transition-colors active:scale-95">Save</button>
                <button type="button" onclick="hideForm()" class="px-4 py-2 bg-slate-800 hover:bg-slate-700 text-slate-300 rounded-lg text-sm transition-colors">Cancel</button>
            </div>
        </form>
    </div>

    <!-- User List -->
    <div id="usersList"></div>
</div>
{% endblock %}

{% block scripts %}
<script nonce="{{ request.state.csp_nonce }}">
async function loadUsers() {
    const res = await apiFetch('/api/users');
    const data = await res.json();
    const el = document.getElementById('usersList');

    if (!data.users || data.users.length === 0) {
        el.innerHTML = `
            <div class="bg-slate-900/40 border border-slate-800 rounded-xl p-10 flex flex-col items-center justify-center text-center">
                <span class="material-symbols-outlined text-4xl text-slate-600 mb-3">person_off</span>
                <p class="text-sm text-slate-500">No users found</p>
            </div>`;
        return;
    }

    el.innerHTML = `<div class="bg-slate-900/40 border border-slate-800 rounded-xl overflow-hidden divide-y divide-slate-800/50">` +
    data.users.map(u => `
        <div class="flex items-center justify-between px-5 py-3.5 hover:bg-slate-800/30 transition-colors">
            <div class="flex items-center gap-3">
                <div class="w-9 h-9 rounded-full bg-slate-800 border border-slate-700 flex items-center justify-center text-sm font-semibold text-slate-300 font-label">
                    ${u.username[0].toUpperCase()}
                </div>
                <div>
                    <div class="flex items-center gap-2">
                        <span class="font-semibold text-white text-sm">${u.username}</span>
                        <span class="text-[10px] ${u.role === 'admin' ? 'bg-purple-500/20 text-purple-400 border border-purple-500/30' : 'bg-slate-700/50 text-slate-400 border border-slate-700/30'} px-2 py-0.5 rounded">${u.role}</span>
                        ${!u.is_active ? '<span class="text-[10px] bg-red-500/20 text-red-400 border border-red-500/30 px-2 py-0.5 rounded">disabled</span>' : ''}
                    </div>
                    <div class="text-xs text-slate-500 mt-0.5">${u.email || ''}</div>
                </div>
            </div>
            <div class="flex gap-1.5 shrink-0">
                <button onclick="toggleActive(${u.id}, ${!u.is_active})" class="px-2 py-1 text-xs ${u.is_active ? 'bg-yellow-600/20 text-yellow-400 hover:bg-yellow-600/30' : 'bg-green-600/20 text-green-400 hover:bg-green-600/30'} rounded transition-colors">
                    ${u.is_active ? 'Disable' : 'Enable'}
                </button>
                <button onclick="deleteUser(${u.id}, '${u.username}')" class="px-2 py-1 text-xs bg-red-600/20 text-red-400 hover:bg-red-600/30 rounded transition-colors">Delete</button>
            </div>
        </div>
    `).join('') + `</div>`;
}

function showAddForm() {
    document.getElementById('userForm').classList.remove('hidden');
    document.getElementById('formTitle').textContent = 'Add User';
    document.getElementById('uForm').reset();
    document.getElementById('uForm').user_id.value = '';
    document.getElementById('uForm').username.disabled = false;
}

function hideForm() {
    document.getElementById('userForm').classList.add('hidden');
    document.getElementById('formError').classList.add('hidden');
}

document.getElementById('uForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const form = e.target;
    const error = document.getElementById('formError');
    error.classList.add('hidden');

    const body = {
        username: form.username.value,
        password: form.password.value,
        email: form.email.value || null,
        role: form.role.value,
    };

    const userId = form.user_id.value;
    const url = userId ? `/api/users/${userId}` : '/api/users';
    const method = userId ? 'PUT' : 'POST';

    const res = await apiFetch(url, { method, body: JSON.stringify(body) });
    const data = await res.json();

    if (data.error) {
        error.textContent = data.error;
        error.classList.remove('hidden');
    } else {
        hideForm();
        loadUsers();
    }
});

async function toggleActive(id, active) {
    await apiFetch(`/api/users/${id}`, {
        method: 'PUT',
        body: JSON.stringify({ is_active: active }),
    });
    loadUsers();
}

async function deleteUser(id, name) {
    if (!confirm(`Delete user "${name}"? This cannot be undone.`)) return;
    const res = await apiFetch(`/api/users/${id}`, { method: 'DELETE' });
    const data = await res.json();
    if (data.error) alert(data.error);
    else loadUsers();
}

loadUsers();
</script>
{% endblock %}
