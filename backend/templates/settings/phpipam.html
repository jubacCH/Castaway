{% extends "base.html" %}
{% block title %}IPAM — Castaway{% endblock %}

{% block topbar_left %}
<span class="material-symbols-outlined text-primary text-xl">dns</span>
<h1 class="font-headline font-semibold text-on-surface text-base">IPAM Integration</h1>
<span class="text-xs text-outline font-label">Import hosts from phpIPAM as SSH connections</span>
{% endblock %}

{% block content %}
<div class="p-6 pb-28 lg:pb-6 max-w-4xl space-y-5">

    <!-- Config Form -->
    <div class="glass-panel rounded-[2rem] border border-white/20 shadow-xl overflow-hidden">
        <div class="px-6 pt-6 pb-4 border-b border-outline-variant/15">
            <div class="text-[10px] font-bold tracking-[0.2em] uppercase text-outline/60 font-label" id="formTitle">Add phpIPAM Instance</div>
        </div>
        <div class="px-6 py-5">
            <div id="error" class="hidden mb-4 p-3 rounded-2xl text-sm font-mono text-xs"
                 style="background:rgba(186,26,26,0.08);border:1px solid rgba(186,26,26,0.15);color:#ba1a1a;"></div>
            <form id="configForm" class="space-y-5">
                <input type="hidden" name="config_id" value="">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-semibold tracking-wide text-on-surface-variant/70 mb-1.5 font-label">Name</label>
                        <input type="text" name="name" required placeholder="Production phpIPAM"
                            class="w-full px-4 py-2.5 bg-surface-container-high border-none rounded-xl text-on-surface text-sm focus:outline-none focus:ring-2 focus:ring-primary/20 transition-all">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold tracking-wide text-on-surface-variant/70 mb-1.5 font-label">URL</label>
                        <input type="url" name="url" required placeholder="https://phpipam.local"
                            class="w-full px-4 py-2.5 bg-surface-container-high border-none rounded-xl text-on-surface text-sm focus:outline-none focus:ring-2 focus:ring-primary/20 transition-all">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold tracking-wide text-on-surface-variant/70 mb-1.5 font-label">App ID</label>
                        <input type="text" name="app_id" required placeholder="castaway"
                            class="w-full px-4 py-2.5 bg-surface-container-high border-none rounded-xl text-on-surface text-sm focus:outline-none focus:ring-2 focus:ring-primary/20 transition-all">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold tracking-wide text-on-surface-variant/70 mb-1.5 font-label">App Secret (Token)</label>
                        <input type="password" name="app_secret" placeholder="For App Code auth"
                            class="w-full px-4 py-2.5 bg-surface-container-high border-none rounded-xl text-on-surface text-sm focus:outline-none focus:ring-2 focus:ring-primary/20 transition-all">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold tracking-wide text-on-surface-variant/70 mb-1.5 font-label">Username <span class="font-normal text-outline/50">(optional)</span></label>
                        <input type="text" name="username" placeholder="For User auth"
                            class="w-full px-4 py-2.5 bg-surface-container-high border-none rounded-xl text-on-surface text-sm focus:outline-none focus:ring-2 focus:ring-primary/20 transition-all">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold tracking-wide text-on-surface-variant/70 mb-1.5 font-label">Password <span class="font-normal text-outline/50">(optional)</span></label>
                        <input type="password" name="password"
                            class="w-full px-4 py-2.5 bg-surface-container-high border-none rounded-xl text-on-surface text-sm focus:outline-none focus:ring-2 focus:ring-primary/20 transition-all">
                    </div>
                </div>
                <label class="flex items-center gap-2.5 cursor-pointer select-none">
                    <input type="checkbox" name="verify_ssl" checked class="rounded-md bg-surface-container border-outline-variant text-primary w-4 h-4">
                    <span class="text-sm text-on-surface-variant">Verify SSL</span>
                </label>
                <div class="flex gap-2">
                    <button type="submit"
                        class="flex items-center gap-2 px-5 py-2.5 rounded-full bg-gradient-to-r from-primary to-primary-container text-white text-sm font-semibold shadow-md shadow-primary/20 hover:shadow-lg transition-all active:scale-[0.98]">
                        <span class="material-symbols-outlined text-[16px]">save</span> Save
                    </button>
                    <button type="button" onclick="resetForm()" id="cancelBtn"
                        class="hidden px-5 py-2.5 rounded-full bg-surface-container text-on-surface-variant hover:text-on-surface text-sm font-semibold transition-all">
                        Cancel
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Existing Configs -->
    <div id="configsList"></div>

    <!-- Sync Results -->
    <div id="syncResults" class="hidden glass-panel rounded-[2rem] border border-white/20 shadow-xl overflow-hidden">
        <div class="px-6 pt-6 pb-4 border-b border-outline-variant/15">
            <div class="text-[10px] font-bold tracking-[0.2em] uppercase text-outline/60 font-label" id="syncTitle">Sync Results</div>
        </div>
        <div class="px-6 py-5" id="syncContent"></div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script nonce="{{ request.state.csp_nonce }}">
let editingId = null;

async function loadConfigs() {
    const res = await apiFetch('/api/phpipam/configs');
    const data = await res.json();
    const el = document.getElementById('configsList');

    if (!data.configs || data.configs.length === 0) {
        el.innerHTML = `
            <div class="glass-panel rounded-[2rem] border border-white/20 shadow-xl p-12 flex flex-col items-center justify-center text-center">
                <span class="material-symbols-outlined text-5xl text-outline/30 mb-3">dns</span>
                <p class="text-sm text-outline">No phpIPAM instances configured yet</p>
            </div>`;
        return;
    }

    el.innerHTML = data.configs.map(c => `
        <div class="glass-panel rounded-[2rem] border border-white/20 shadow-xl overflow-hidden mb-3">
            <div class="px-5 py-4 flex items-center justify-between gap-4">
                <div class="flex items-center gap-3 min-w-0">
                    <div class="w-10 h-10 rounded-2xl bg-gradient-to-br from-primary/15 to-primary-container/15 flex items-center justify-center shrink-0">
                        <span class="material-symbols-outlined text-primary text-lg">dns</span>
                    </div>
                    <div class="min-w-0">
                        <div class="font-semibold text-on-surface text-sm">${c.name}</div>
                        <div class="flex items-center gap-2 mt-0.5 flex-wrap">
                            <span class="text-xs font-mono text-outline">${c.url}</span>
                            <span class="px-2 py-0.5 rounded-full text-[10px] font-bold bg-surface-container text-outline border border-outline-variant/30">App: ${c.app_id}</span>
                            ${c.last_sync_at ? `<span class="text-[10px] text-outline/60">Synced: ${c.last_sync_at}</span>` : ''}
                        </div>
                    </div>
                </div>
                <div class="flex gap-1.5 shrink-0 flex-wrap justify-end">
                    <button data-action="test" data-id="${c.id}" class="px-3 py-1.5 rounded-full text-xs font-semibold bg-primary/10 text-primary hover:bg-primary/15 transition-all">Test</button>
                    <button data-action="preview" data-id="${c.id}" class="px-3 py-1.5 rounded-full text-xs font-semibold bg-tertiary/10 text-tertiary hover:bg-tertiary/15 transition-all">Preview</button>
                    <button data-action="sync" data-id="${c.id}" class="px-3 py-1.5 rounded-full text-xs font-semibold bg-green-500/15 text-green-700 hover:bg-green-500/20 transition-all">Sync</button>
                    <button data-action="delete" data-id="${c.id}" class="px-3 py-1.5 rounded-full text-xs font-semibold bg-error/10 text-error hover:bg-error/15 transition-all">Delete</button>
                </div>
            </div>
        </div>
    `).join('');
}

document.getElementById('configForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const form = e.target;
    const error = document.getElementById('error');
    error.classList.add('hidden');

    const body = {
        name: form.name.value,
        url: form.url.value,
        app_id: form.app_id.value,
        app_secret: form.app_secret.value || null,
        username: form.username.value || null,
        password: form.password.value || null,
        verify_ssl: form.verify_ssl.checked,
    };

    const configId = form.config_id.value;
    const url = configId ? `/api/phpipam/configs/${configId}` : '/api/phpipam/configs';
    const method = configId ? 'PUT' : 'POST';

    const res = await apiFetch(url, { method, body: JSON.stringify(body) });
    const data = await res.json();

    if (data.error) {
        error.textContent = data.error;
        error.classList.remove('hidden');
    } else {
        resetForm();
        loadConfigs();
    }
});

function resetForm() {
    const form = document.getElementById('configForm');
    form.reset();
    form.config_id.value = '';
    form.verify_ssl.checked = true;
    document.getElementById('formTitle').textContent = 'Add phpIPAM Instance';
    document.getElementById('cancelBtn').classList.add('hidden');
    editingId = null;
}

function showLoading(title) {
    const el = document.getElementById('syncResults');
    el.classList.remove('hidden');
    document.getElementById('syncTitle').textContent = title;
    document.getElementById('syncContent').innerHTML = `
        <div class="flex items-center gap-3 text-sm text-outline">
            <span class="material-symbols-outlined animate-spin text-primary">sync</span>
            Loading…
        </div>`;
}

async function testConfig(id) {
    showLoading('Testing connection…');
    const res = await apiFetch(`/api/phpipam/configs/${id}/test`, { method: 'POST' });
    const data = await res.json();
    document.getElementById('syncTitle').textContent = 'Connection Test';
    document.getElementById('syncContent').innerHTML = data.ok
        ? `<p class="text-green-700 text-sm flex items-center gap-2"><span class="material-symbols-outlined text-[16px]">check_circle</span> Connected! Found ${data.addresses_total} addresses (${data.addresses_active} active)</p>`
        : `<p class="text-error text-sm flex items-center gap-2"><span class="material-symbols-outlined text-[16px]">error</span> Failed: ${data.error}</p>`;
}

async function previewSync(id) {
    showLoading('Loading preview…');
    const res = await apiFetch(`/api/phpipam/configs/${id}/preview`);
    const data = await res.json();
    document.getElementById('syncResults').classList.remove('hidden');
    document.getElementById('syncTitle').textContent = `Preview: ${data.count} hosts`;

    if (data.hosts && data.hosts.length > 0) {
        const rows = data.hosts.slice(0, 50).map(h =>
            `<tr class="border-t border-outline-variant/10 hover:bg-surface-container/30 transition-colors">
                <td class="py-2.5 pr-4 font-mono text-on-surface text-sm">${h.ip}</td>
                <td class="py-2.5 pr-4 text-on-surface-variant text-sm">${h.hostname}</td>
                <td class="py-2.5 text-outline text-xs">${h.last_seen || '—'}</td>
            </tr>`
        ).join('');
        document.getElementById('syncContent').innerHTML = `
            <table class="w-full text-sm">
                <thead><tr class="text-[10px] text-outline/60 font-label uppercase tracking-[0.15em] text-left">
                    <th class="pr-4 pb-3">IP</th><th class="pr-4 pb-3">Hostname</th><th class="pb-3">Last Seen</th>
                </tr></thead>
                <tbody>${rows}</tbody>
            </table>
            ${data.count > 50 ? `<p class="mt-3 text-xs text-outline">… and ${data.count - 50} more</p>` : ''}`;
    } else {
        document.getElementById('syncContent').innerHTML = `
            <div class="flex flex-col items-center py-8">
                <span class="material-symbols-outlined text-4xl text-outline/30 mb-2">search_off</span>
                <p class="text-sm text-outline">No active hosts found</p>
            </div>`;
    }
}

async function syncNow(id) {
    showLoading('Syncing hosts…');
    const res = await apiFetch(`/api/phpipam/configs/${id}/sync`, { method: 'POST' });
    const data = await res.json();
    document.getElementById('syncResults').classList.remove('hidden');
    document.getElementById('syncTitle').textContent = 'Sync Results';
    document.getElementById('syncContent').innerHTML = `
        <div class="flex gap-4 text-sm flex-wrap">
            <span class="flex items-center gap-1.5 text-green-700"><span class="material-symbols-outlined text-[16px]">add_circle</span> Added: ${data.added}</span>
            <span class="flex items-center gap-1.5 text-primary"><span class="material-symbols-outlined text-[16px]">update</span> Updated: ${data.updated}</span>
            <span class="flex items-center gap-1.5 text-outline"><span class="material-symbols-outlined text-[16px]">skip_next</span> Skipped: ${data.skipped}</span>
            ${data.errors && data.errors.length > 0 ? `<span class="flex items-center gap-1.5 text-error"><span class="material-symbols-outlined text-[16px]">error</span> Errors: ${data.errors.length}</span>` : ''}
        </div>
        ${data.errors && data.errors.length > 0 ? `<ul class="mt-3 text-xs text-error space-y-1">${data.errors.map(e => `<li>• ${e}</li>`).join('')}</ul>` : ''}`;
    loadConfigs();
}

async function deleteConfig(id) {
    if (!confirm('Delete this phpIPAM configuration?')) return;
    await apiFetch(`/api/phpipam/configs/${id}`, { method: 'DELETE' });
    loadConfigs();
}

document.getElementById('configsList').addEventListener('click', (e) => {
    const btn = e.target.closest('[data-action]');
    if (!btn) return;
    const id = parseInt(btn.dataset.id);
    switch (btn.dataset.action) {
        case 'test': testConfig(id); break;
        case 'preview': previewSync(id); break;
        case 'sync': syncNow(id); break;
        case 'delete': deleteConfig(id); break;
    }
});

loadConfigs();
</script>
{% endblock %}
