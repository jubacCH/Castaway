{% extends "base.html" %}
{% block title %}Keyring — Castaway{% endblock %}

{% block topbar_left %}
<span class="material-symbols-outlined text-primary text-xl">vpn_key</span>
<h1 class="font-headline font-semibold text-on-surface text-base">Keyring</h1>
<span class="text-xs text-outline font-label">Import credentials and assign to connections</span>
{% endblock %}

{% block content %}
<div class="p-6 pb-28 lg:pb-6 max-w-4xl space-y-5">

    <!-- Config Form -->
    <div class="glass-panel rounded-[2rem] border border-white/20 shadow-xl overflow-hidden">
        <div class="px-6 pt-6 pb-4 border-b border-outline-variant/15">
            <div class="text-[10px] font-bold tracking-[0.2em] uppercase text-outline/60 font-label" id="formTitle">Add Vaultwarden Instance</div>
        </div>
        <div class="px-6 py-5">
            <div id="error" class="hidden mb-4 p-3 rounded-2xl text-sm font-mono text-xs"
                 style="background:rgba(186,26,26,0.08);border:1px solid rgba(186,26,26,0.15);color:#ba1a1a;"></div>
            <form id="configForm" class="space-y-5">
                <input type="hidden" name="config_id" value="">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-semibold tracking-wide text-on-surface-variant/70 mb-1.5 font-label">Name</label>
                        <input type="text" name="name" required placeholder="My Vaultwarden"
                            class="w-full px-4 py-2.5 bg-surface-container-high border-none rounded-xl text-on-surface text-sm focus:outline-none focus:ring-2 focus:ring-primary/20 transition-all">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold tracking-wide text-on-surface-variant/70 mb-1.5 font-label">URL</label>
                        <input type="url" name="url" required placeholder="https://vault.example.com"
                            class="w-full px-4 py-2.5 bg-surface-container-high border-none rounded-xl text-on-surface text-sm focus:outline-none focus:ring-2 focus:ring-primary/20 transition-all">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold tracking-wide text-on-surface-variant/70 mb-1.5 font-label">Email</label>
                        <input type="email" name="email" required
                            class="w-full px-4 py-2.5 bg-surface-container-high border-none rounded-xl text-on-surface text-sm focus:outline-none focus:ring-2 focus:ring-primary/20 transition-all">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold tracking-wide text-on-surface-variant/70 mb-1.5 font-label">Master Password</label>
                        <input type="password" name="password" required
                            class="w-full px-4 py-2.5 bg-surface-container-high border-none rounded-xl text-on-surface text-sm focus:outline-none focus:ring-2 focus:ring-primary/20 transition-all">
                    </div>
                </div>
                <div class="flex gap-2">
                    <button type="submit"
                        class="flex items-center gap-2 px-5 py-2.5 rounded-full bg-gradient-to-r from-primary to-primary-container text-white text-sm font-semibold shadow-md shadow-primary/20 hover:shadow-lg transition-all active:scale-[0.98]">
                        <span class="material-symbols-outlined text-[16px]">save</span> Save
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Existing Configs -->
    <div id="configsList"></div>

    <!-- Credential Panel -->
    <div id="credPanel" class="hidden glass-panel rounded-[2rem] border border-white/20 shadow-xl overflow-hidden">
        <div class="px-6 pt-6 pb-4 border-b border-outline-variant/15 flex items-center justify-between">
            <div class="text-[10px] font-bold tracking-[0.2em] uppercase text-outline/60 font-label" id="credTitle">Credentials</div>
            <button onclick="document.getElementById('credPanel').classList.add('hidden')"
                class="flex items-center gap-1 text-xs text-outline hover:text-on-surface transition-colors">
                <span class="material-symbols-outlined text-sm">close</span> Close
            </button>
        </div>
        <div class="px-6 py-5" id="credContent"></div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script nonce="{{ request.state.csp_nonce }}">
let activeConfigId = null;

async function loadConfigs() {
    const res = await apiFetch('/api/vaultwarden/configs');
    const data = await res.json();
    const el = document.getElementById('configsList');

    if (!data.configs || data.configs.length === 0) {
        el.innerHTML = `
            <div class="glass-panel rounded-[2rem] border border-white/20 shadow-xl p-12 flex flex-col items-center justify-center text-center">
                <span class="material-symbols-outlined text-5xl text-outline/30 mb-3">vpn_key</span>
                <p class="text-sm text-outline">No Vaultwarden instances configured yet</p>
            </div>`;
        return;
    }

    el.innerHTML = data.configs.map(c => `
        <div class="glass-panel rounded-[2rem] border border-white/20 shadow-xl overflow-hidden mb-3">
            <div class="px-5 py-4 flex items-center justify-between gap-4">
                <div class="flex items-center gap-3 min-w-0">
                    <div class="w-10 h-10 rounded-2xl bg-gradient-to-br from-primary/15 to-primary-container/15 flex items-center justify-center shrink-0">
                        <span class="material-symbols-outlined text-primary text-lg">vpn_key</span>
                    </div>
                    <div class="min-w-0">
                        <div class="font-semibold text-on-surface text-sm">${c.name}</div>
                        <div class="flex items-center gap-2 mt-0.5 flex-wrap">
                            <span class="text-xs font-mono text-outline">${c.url}</span>
                            ${c.last_sync_at ? `<span class="text-[10px] text-outline/60">Synced: ${c.last_sync_at}</span>` : ''}
                        </div>
                    </div>
                </div>
                <div class="flex gap-1.5 shrink-0 flex-wrap justify-end">
                    <button data-action="test" data-id="${c.id}" class="px-3 py-1.5 rounded-full text-xs font-semibold bg-primary/10 text-primary hover:bg-primary/15 transition-all">Test</button>
                    <button data-action="creds" data-id="${c.id}" class="px-3 py-1.5 rounded-full text-xs font-semibold bg-tertiary/10 text-tertiary hover:bg-tertiary/15 transition-all">Credentials</button>
                    <button data-action="match" data-id="${c.id}" class="px-3 py-1.5 rounded-full text-xs font-semibold bg-green-500/15 text-green-700 hover:bg-green-500/20 transition-all">Auto-Match</button>
                    <button data-action="delete" data-id="${c.id}" class="px-3 py-1.5 rounded-full text-xs font-semibold bg-error/10 text-error hover:bg-error/15 transition-all">Delete</button>
                </div>
            </div>
        </div>
    `).join('');
}

document.getElementById('configForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const form = e.target;
    const error = document.getElementById('error');
    error.classList.add('hidden');

    const body = {
        name: form.name.value,
        url: form.url.value,
        email: form.email.value,
        password: form.password.value,
    };

    const configId = form.config_id.value;
    const url = configId ? `/api/vaultwarden/configs/${configId}` : '/api/vaultwarden/configs';
    const method = configId ? 'PUT' : 'POST';

    const res = await apiFetch(url, { method, body: JSON.stringify(body) });
    const data = await res.json();

    if (data.error) {
        error.textContent = data.error;
        error.classList.remove('hidden');
    } else {
        form.reset();
        form.config_id.value = '';
        loadConfigs();
    }
});

async function testConfig(id) {
    const panel = document.getElementById('credPanel');
    panel.classList.remove('hidden');
    document.getElementById('credTitle').textContent = 'Connection Test';
    document.getElementById('credContent').innerHTML = '<p class="text-outline text-sm flex items-center gap-2"><span class="material-symbols-outlined animate-spin text-primary text-[16px]">sync</span> Testing…</p>';

    const res = await apiFetch(`/api/vaultwarden/configs/${id}/test`, { method: 'POST' });
    const data = await res.json();
    document.getElementById('credContent').innerHTML = data.ok
        ? `<p class="text-green-700 text-sm flex items-center gap-2"><span class="material-symbols-outlined text-[16px]">check_circle</span> Connected! Found ${data.login_items} login items in vault.</p>`
        : `<p class="text-error text-sm flex items-center gap-2"><span class="material-symbols-outlined text-[16px]">error</span> Failed: ${data.error}</p>`;
}

async function showCredentials(id) {
    activeConfigId = id;
    const panel = document.getElementById('credPanel');
    panel.classList.remove('hidden');
    document.getElementById('credTitle').textContent = 'Loading credentials…';
    document.getElementById('credContent').innerHTML = '';

    const res = await apiFetch(`/api/vaultwarden/configs/${id}/preview`);
    const data = await res.json();

    if (data.error) {
        document.getElementById('credTitle').textContent = 'Error';
        document.getElementById('credContent').innerHTML = `<p class="text-error text-sm">${data.error}</p>`;
        return;
    }

    document.getElementById('credTitle').textContent = `${data.count} Credentials`;

    if (data.credentials && data.credentials.length > 0) {
        const rows = data.credentials.map(c => `
            <tr class="border-t border-outline-variant/10 hover:bg-surface-container/30 transition-colors">
                <td class="py-2.5 pr-4 text-on-surface text-sm font-medium">${c.name}</td>
                <td class="py-2.5 pr-4 text-on-surface-variant text-sm">${c.username || '—'}</td>
                <td class="py-2.5 pr-4 font-mono text-outline text-xs">${c.uris.join(', ') || '—'}</td>
                <td class="py-2.5">
                    <span class="px-2.5 py-0.5 rounded-full text-[10px] font-bold ${c.has_password
                        ? 'bg-green-500/15 text-green-700 border border-green-500/20'
                        : 'bg-surface-container text-outline border border-outline-variant/30'}">${c.has_password ? 'Yes' : 'No'}</span>
                </td>
            </tr>
        `).join('');
        document.getElementById('credContent').innerHTML = `
            <div class="overflow-x-auto">
                <table class="w-full">
                    <thead><tr class="text-[10px] text-outline/60 font-label uppercase tracking-[0.15em] text-left">
                        <th class="pr-4 pb-3">Name</th><th class="pr-4 pb-3">Username</th><th class="pr-4 pb-3">URIs</th><th class="pb-3">Password</th>
                    </tr></thead>
                    <tbody>${rows}</tbody>
                </table>
            </div>`;
    } else {
        document.getElementById('credContent').innerHTML = `
            <div class="flex flex-col items-center py-8">
                <span class="material-symbols-outlined text-4xl text-outline/30 mb-2">key_off</span>
                <p class="text-sm text-outline">No login items found</p>
            </div>`;
    }
}

async function autoMatch(id) {
    activeConfigId = id;
    const panel = document.getElementById('credPanel');
    panel.classList.remove('hidden');
    document.getElementById('credTitle').textContent = 'Auto-Matching…';
    document.getElementById('credContent').innerHTML = '';

    const res = await apiFetch(`/api/vaultwarden/configs/${id}/auto-match`);
    const data = await res.json();

    if (data.error) {
        document.getElementById('credTitle').textContent = 'Error';
        document.getElementById('credContent').innerHTML = `<p class="text-error text-sm">${data.error}</p>`;
        return;
    }

    document.getElementById('credTitle').textContent = `${data.count} Matches Found`;

    if (data.matches && data.matches.length > 0) {
        const rows = data.matches.map((m, i) => `
            <tr class="border-t border-outline-variant/10 hover:bg-surface-container/30 transition-colors">
                <td class="py-2.5 pr-4"><input type="checkbox" checked data-idx="${i}" class="match-cb rounded bg-surface-container border-outline-variant text-primary w-4 h-4"></td>
                <td class="py-2.5 pr-4 text-on-surface text-sm">${m.connection_name} <span class="font-mono text-xs text-outline">(${m.connection_host})</span></td>
                <td class="py-2.5 pr-4 text-on-surface-variant text-sm">${m.credential_name} <span class="text-xs text-outline">${m.credential_username}</span></td>
                <td class="py-2.5"><span class="px-2.5 py-0.5 rounded-full text-[10px] font-bold bg-surface-container text-outline border border-outline-variant/30">${m.match_type}</span></td>
            </tr>
        `).join('');
        document.getElementById('credContent').innerHTML = `
            <div class="overflow-x-auto mb-4">
                <table class="w-full">
                    <thead><tr class="text-[10px] text-outline/60 font-label uppercase tracking-[0.15em] text-left">
                        <th class="pr-4 pb-3"></th><th class="pr-4 pb-3">Connection</th><th class="pr-4 pb-3">Credential</th><th class="pb-3">Match</th>
                    </tr></thead>
                    <tbody>${rows}</tbody>
                </table>
            </div>
            <button data-action="apply" data-id="${id}"
                class="flex items-center gap-2 px-5 py-2.5 rounded-full bg-gradient-to-r from-primary to-primary-container text-white text-sm font-semibold shadow-md shadow-primary/20 hover:shadow-lg transition-all active:scale-[0.98]">
                <span class="material-symbols-outlined text-[16px]">link</span> Apply Selected
            </button>`;
        window._matches = data.matches;
    } else {
        document.getElementById('credContent').innerHTML = `
            <div class="flex flex-col items-center py-8">
                <span class="material-symbols-outlined text-4xl text-outline/30 mb-2">link_off</span>
                <p class="text-sm text-outline">No matches found. Make sure you have connections and credentials with matching hostnames.</p>
            </div>`;
    }
}

async function applyMatches(configId) {
    const checkboxes = document.querySelectorAll('.match-cb:checked');
    const assignments = Array.from(checkboxes).map(cb => {
        const m = window._matches[parseInt(cb.dataset.idx)];
        return { connection_id: m.connection_id, credential_id: m.credential_id };
    });

    if (assignments.length === 0) {
        alert('No matches selected');
        return;
    }

    const res = await apiFetch(`/api/vaultwarden/configs/${configId}/bulk-assign`, {
        method: 'POST',
        body: JSON.stringify({ assignments }),
    });
    const data = await res.json();

    document.getElementById('credContent').innerHTML = `
        <p class="text-green-700 text-sm flex items-center gap-2"><span class="material-symbols-outlined text-[16px]">check_circle</span> Assigned ${data.assigned} credentials</p>
        ${data.errors && data.errors.length > 0 ? `<ul class="mt-3 text-xs text-error space-y-1">${data.errors.map(e => `<li>• ${e}</li>`).join('')}</ul>` : ''}`;
}

async function deleteConfig(id) {
    if (!confirm('Delete this Vaultwarden configuration?')) return;
    await apiFetch(`/api/vaultwarden/configs/${id}`, { method: 'DELETE' });
    loadConfigs();
}

document.getElementById('configsList').addEventListener('click', (e) => {
    const btn = e.target.closest('[data-action]');
    if (!btn) return;
    const id = parseInt(btn.dataset.id);
    switch (btn.dataset.action) {
        case 'test': testConfig(id); break;
        case 'creds': showCredentials(id); break;
        case 'match': autoMatch(id); break;
        case 'delete': deleteConfig(id); break;
    }
});
document.getElementById('credPanel').addEventListener('click', (e) => {
    const btn = e.target.closest('[data-action="apply"]');
    if (btn) applyMatches(parseInt(btn.dataset.id));
});

loadConfigs();
</script>
{% endblock %}
