{% extends "base.html" %}
{% block title %}Vaultwarden — Castaway{% endblock %}

{% block content %}
<div class="p-6 max-w-4xl">
    <h2 class="text-xl font-semibold text-white mb-1">Vaultwarden Integration</h2>
    <p class="text-sm text-slate-500 mb-6">Import credentials from Vaultwarden/Bitwarden and assign to connections</p>

    <!-- Config Form -->
    <div class="bg-slate-900 border border-slate-800 rounded-lg p-5 mb-6">
        <h3 class="text-sm font-semibold text-white mb-4" id="formTitle">Add Vaultwarden Instance</h3>
        <div id="error" class="hidden mb-4 p-3 rounded-lg bg-red-500/10 border border-red-500/20 text-red-400 text-sm"></div>
        <form id="configForm" class="space-y-4">
            <input type="hidden" name="config_id" value="">
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm text-slate-400 mb-1">Name</label>
                    <input type="text" name="name" required placeholder="My Vaultwarden"
                        class="w-full px-3 py-2 bg-slate-800 border border-slate-700 rounded-lg text-white focus:outline-none focus:border-blue-500">
                </div>
                <div>
                    <label class="block text-sm text-slate-400 mb-1">URL</label>
                    <input type="url" name="url" required placeholder="https://vault.example.com"
                        class="w-full px-3 py-2 bg-slate-800 border border-slate-700 rounded-lg text-white focus:outline-none focus:border-blue-500">
                </div>
                <div>
                    <label class="block text-sm text-slate-400 mb-1">Email</label>
                    <input type="email" name="email" required
                        class="w-full px-3 py-2 bg-slate-800 border border-slate-700 rounded-lg text-white focus:outline-none focus:border-blue-500">
                </div>
                <div>
                    <label class="block text-sm text-slate-400 mb-1">Master Password</label>
                    <input type="password" name="password" required
                        class="w-full px-3 py-2 bg-slate-800 border border-slate-700 rounded-lg text-white focus:outline-none focus:border-blue-500">
                </div>
            </div>
            <button type="submit" class="px-4 py-2 bg-blue-600 hover:bg-blue-500 text-white rounded-lg text-sm font-medium transition-colors">Save</button>
        </form>
    </div>

    <!-- Existing Configs -->
    <div id="configsList"></div>

    <!-- Credential Preview / Assignment -->
    <div id="credPanel" class="hidden mt-6 bg-slate-900 border border-slate-800 rounded-lg p-5">
        <div class="flex items-center justify-between mb-4">
            <h3 class="text-sm font-semibold text-white" id="credTitle">Credentials</h3>
            <button onclick="document.getElementById('credPanel').classList.add('hidden')" class="text-xs text-slate-500 hover:text-slate-300">Close</button>
        </div>
        <div id="credContent"></div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script nonce="{{ request.state.csp_nonce }}">
let activeConfigId = null;

async function loadConfigs() {
    const res = await apiFetch('/api/vaultwarden/configs');
    const data = await res.json();
    const el = document.getElementById('configsList');

    if (!data.configs || data.configs.length === 0) {
        el.innerHTML = '';
        return;
    }

    el.innerHTML = data.configs.map(c => `
        <div class="bg-slate-900 border border-slate-800 rounded-lg p-4 mb-3">
            <div class="flex items-center justify-between">
                <div>
                    <span class="font-medium text-white">${c.name}</span>
                    <span class="text-xs text-slate-500 ml-2">${c.url}</span>
                    ${c.last_sync_at ? `<span class="text-xs text-slate-600 ml-2">Last sync: ${c.last_sync_at}</span>` : ''}
                </div>
                <div class="flex gap-1">
                    <button onclick="testConfig(${c.id})" class="px-2 py-1 text-xs bg-blue-600/20 text-blue-400 hover:bg-blue-600/30 rounded transition-colors">Test</button>
                    <button onclick="showCredentials(${c.id})" class="px-2 py-1 text-xs bg-purple-600/20 text-purple-400 hover:bg-purple-600/30 rounded transition-colors">Credentials</button>
                    <button onclick="autoMatch(${c.id})" class="px-2 py-1 text-xs bg-green-600/20 text-green-400 hover:bg-green-600/30 rounded transition-colors">Auto-Match</button>
                    <button onclick="deleteConfig(${c.id})" class="px-2 py-1 text-xs bg-red-600/20 text-red-400 hover:bg-red-600/30 rounded transition-colors">Delete</button>
                </div>
            </div>
        </div>
    `).join('');
}

document.getElementById('configForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const form = e.target;
    const error = document.getElementById('error');
    error.classList.add('hidden');

    const body = {
        name: form.name.value,
        url: form.url.value,
        email: form.email.value,
        password: form.password.value,
    };

    const configId = form.config_id.value;
    const url = configId ? `/api/vaultwarden/configs/${configId}` : '/api/vaultwarden/configs';
    const method = configId ? 'PUT' : 'POST';

    const res = await apiFetch(url, { method, body: JSON.stringify(body) });
    const data = await res.json();

    if (data.error) {
        error.textContent = data.error;
        error.classList.remove('hidden');
    } else {
        form.reset();
        form.config_id.value = '';
        loadConfigs();
    }
});

async function testConfig(id) {
    const panel = document.getElementById('credPanel');
    panel.classList.remove('hidden');
    document.getElementById('credTitle').textContent = 'Connection Test';
    document.getElementById('credContent').innerHTML = '<p class="text-slate-400 text-sm">Testing...</p>';

    const res = await apiFetch(`/api/vaultwarden/configs/${id}/test`, { method: 'POST' });
    const data = await res.json();
    document.getElementById('credContent').innerHTML = data.ok
        ? `<p class="text-green-400 text-sm">Connected! Found ${data.login_items} login items in vault.</p>`
        : `<p class="text-red-400 text-sm">Failed: ${data.error}</p>`;
}

async function showCredentials(id) {
    activeConfigId = id;
    const panel = document.getElementById('credPanel');
    panel.classList.remove('hidden');
    document.getElementById('credTitle').textContent = 'Loading credentials...';
    document.getElementById('credContent').innerHTML = '';

    const res = await apiFetch(`/api/vaultwarden/configs/${id}/preview`);
    const data = await res.json();

    if (data.error) {
        document.getElementById('credTitle').textContent = 'Error';
        document.getElementById('credContent').innerHTML = `<p class="text-red-400 text-sm">${data.error}</p>`;
        return;
    }

    document.getElementById('credTitle').textContent = `${data.count} Credentials`;

    if (data.credentials && data.credentials.length > 0) {
        const rows = data.credentials.map(c => `
            <tr class="border-t border-slate-800">
                <td class="py-2 pr-4 text-white text-sm">${c.name}</td>
                <td class="py-2 pr-4 text-slate-400 text-sm">${c.username || '-'}</td>
                <td class="py-2 pr-4 text-slate-500 text-xs">${c.uris.join(', ') || '-'}</td>
                <td class="py-2"><span class="text-xs ${c.has_password ? 'text-green-400' : 'text-slate-600'}">${c.has_password ? 'Yes' : 'No'}</span></td>
            </tr>
        `).join('');
        document.getElementById('credContent').innerHTML = `
            <table class="w-full"><thead><tr class="text-slate-500 text-xs text-left"><th class="pr-4 pb-2">Name</th><th class="pr-4 pb-2">Username</th><th class="pr-4 pb-2">URIs</th><th class="pb-2">Password</th></tr></thead><tbody>${rows}</tbody></table>`;
    } else {
        document.getElementById('credContent').innerHTML = '<p class="text-slate-500 text-sm">No login items found</p>';
    }
}

async function autoMatch(id) {
    activeConfigId = id;
    const panel = document.getElementById('credPanel');
    panel.classList.remove('hidden');
    document.getElementById('credTitle').textContent = 'Auto-Matching...';
    document.getElementById('credContent').innerHTML = '';

    const res = await apiFetch(`/api/vaultwarden/configs/${id}/auto-match`);
    const data = await res.json();

    if (data.error) {
        document.getElementById('credTitle').textContent = 'Error';
        document.getElementById('credContent').innerHTML = `<p class="text-red-400 text-sm">${data.error}</p>`;
        return;
    }

    document.getElementById('credTitle').textContent = `${data.count} Matches Found`;

    if (data.matches && data.matches.length > 0) {
        const rows = data.matches.map((m, i) => `
            <tr class="border-t border-slate-800">
                <td class="py-2 pr-4"><input type="checkbox" checked data-idx="${i}" class="match-cb rounded bg-slate-800 border-slate-600 text-blue-500"></td>
                <td class="py-2 pr-4 text-white text-sm">${m.connection_name} <span class="text-xs text-slate-500">(${m.connection_host})</span></td>
                <td class="py-2 pr-4 text-slate-300 text-sm">${m.credential_name} <span class="text-xs text-slate-500">${m.credential_username}</span></td>
                <td class="py-2 text-xs text-slate-500">${m.match_type}</td>
            </tr>
        `).join('');
        document.getElementById('credContent').innerHTML = `
            <table class="w-full mb-4"><thead><tr class="text-slate-500 text-xs text-left"><th class="pr-4 pb-2"></th><th class="pr-4 pb-2">Connection</th><th class="pr-4 pb-2">Credential</th><th class="pb-2">Match</th></tr></thead><tbody>${rows}</tbody></table>
            <button onclick="applyMatches(${id})" class="px-4 py-2 bg-green-600 hover:bg-green-500 text-white rounded-lg text-sm font-medium transition-colors">Apply Selected</button>`;
        window._matches = data.matches;
    } else {
        document.getElementById('credContent').innerHTML = '<p class="text-slate-500 text-sm">No matches found. Make sure you have connections and credentials with matching hostnames.</p>';
    }
}

async function applyMatches(configId) {
    const checkboxes = document.querySelectorAll('.match-cb:checked');
    const assignments = Array.from(checkboxes).map(cb => {
        const m = window._matches[parseInt(cb.dataset.idx)];
        return { connection_id: m.connection_id, credential_id: m.credential_id };
    });

    if (assignments.length === 0) {
        alert('No matches selected');
        return;
    }

    const res = await apiFetch(`/api/vaultwarden/configs/${configId}/bulk-assign`, {
        method: 'POST',
        body: JSON.stringify({ assignments }),
    });
    const data = await res.json();

    document.getElementById('credContent').innerHTML = `
        <p class="text-green-400 text-sm">Assigned ${data.assigned} credentials</p>
        ${data.errors && data.errors.length > 0 ? `<ul class="mt-2 text-xs text-red-400">${data.errors.map(e => `<li>${e}</li>`).join('')}</ul>` : ''}`;
}

async function deleteConfig(id) {
    if (!confirm('Delete this Vaultwarden configuration?')) return;
    await apiFetch(`/api/vaultwarden/configs/${id}`, { method: 'DELETE' });
    loadConfigs();
}

loadConfigs();
</script>
{% endblock %}
