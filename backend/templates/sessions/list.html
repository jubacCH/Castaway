{% extends "base.html" %}
{% block title %}Session Log — Castaway{% endblock %}

{% block topbar_left %}
<span class="material-symbols-outlined text-blue-400 text-xl">history</span>
<h1 class="text-white font-headline font-semibold text-base">Session Log</h1>
<span class="text-xs text-slate-500 font-label">SSH session audit trail</span>
{% endblock %}

{% block content %}
<div class="p-6 space-y-4">

    <div class="bg-slate-900/40 border border-slate-800 rounded-xl overflow-hidden">
        <table class="w-full text-sm">
            <thead>
                <tr class="border-b border-slate-800">
                    <th class="px-4 py-3 text-left text-xs font-bold text-slate-400 uppercase tracking-wider font-label">User</th>
                    <th class="px-4 py-3 text-left text-xs font-bold text-slate-400 uppercase tracking-wider font-label">Connection</th>
                    <th class="px-4 py-3 text-left text-xs font-bold text-slate-400 uppercase tracking-wider font-label">Host</th>
                    <th class="px-4 py-3 text-left text-xs font-bold text-slate-400 uppercase tracking-wider font-label">Started</th>
                    <th class="px-4 py-3 text-left text-xs font-bold text-slate-400 uppercase tracking-wider font-label">Duration</th>
                    <th class="px-4 py-3 text-left text-xs font-bold text-slate-400 uppercase tracking-wider font-label">IP</th>
                    <th class="px-4 py-3 text-left text-xs font-bold text-slate-400 uppercase tracking-wider font-label">Traffic</th>
                </tr>
            </thead>
            <tbody id="sessionsBody">
                <tr><td colspan="7" class="px-4 py-12 text-center">
                    <span class="material-symbols-outlined text-3xl text-slate-700 mb-2 block">sync</span>
                    <span class="text-sm text-slate-500">Loading...</span>
                </td></tr>
            </tbody>
        </table>
    </div>

    <div class="flex items-center justify-between">
        <span id="totalInfo" class="text-xs text-slate-500 font-label"></span>
        <div class="flex gap-2">
            <button onclick="prevPage()" id="prevBtn" class="px-3 py-1.5 text-xs bg-slate-800/50 border border-slate-700 hover:bg-slate-700 text-slate-300 rounded-lg transition-colors disabled:opacity-40 disabled:cursor-not-allowed" disabled>
                <span class="material-symbols-outlined text-sm align-middle">chevron_left</span> Prev
            </button>
            <button onclick="nextPage()" id="nextBtn" class="px-3 py-1.5 text-xs bg-slate-800/50 border border-slate-700 hover:bg-slate-700 text-slate-300 rounded-lg transition-colors disabled:opacity-40 disabled:cursor-not-allowed">
                Next <span class="material-symbols-outlined text-sm align-middle">chevron_right</span>
            </button>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script nonce="{{ request.state.csp_nonce }}">
let page = 0;
const limit = 50;

function formatDuration(sec) {
    if (sec == null) return 'active';
    if (sec < 60) return `${sec}s`;
    if (sec < 3600) return `${Math.floor(sec/60)}m ${sec%60}s`;
    return `${Math.floor(sec/3600)}h ${Math.floor((sec%3600)/60)}m`;
}

function formatBytes(b) {
    if (!b) return '0 B';
    if (b < 1024) return `${b} B`;
    if (b < 1048576) return `${(b/1024).toFixed(1)} KB`;
    return `${(b/1048576).toFixed(1)} MB`;
}

async function loadSessions() {
    const res = await apiFetch(`/api/sessions?limit=${limit}&offset=${page * limit}`);
    const data = await res.json();
    const body = document.getElementById('sessionsBody');

    if (!data.sessions || data.sessions.length === 0) {
        body.innerHTML = `<tr><td colspan="7" class="px-4 py-12 text-center">
            <span class="material-symbols-outlined text-4xl text-slate-700 mb-2 block">history_toggle_off</span>
            <span class="text-sm text-slate-500">No sessions recorded yet</span>
        </td></tr>`;
        return;
    }

    body.innerHTML = data.sessions.map(s => `
        <tr class="border-t border-slate-800/50 hover:bg-slate-800/30 transition-colors">
            <td class="px-4 py-2.5 text-white text-sm font-medium">${s.user}</td>
            <td class="px-4 py-2.5 text-slate-300 text-sm">${s.connection_name}</td>
            <td class="px-4 py-2.5 font-mono text-slate-500 text-xs">${s.connection_host}</td>
            <td class="px-4 py-2.5 text-slate-400 text-xs">${s.started_at || '-'}</td>
            <td class="px-4 py-2.5">
                <span class="text-[10px] ${s.ended_at ? 'bg-slate-700/50 text-slate-400 border border-slate-700/30' : 'bg-green-500/20 text-green-400 border border-green-500/30'} px-2 py-0.5 rounded">${formatDuration(s.duration_sec)}</span>
            </td>
            <td class="px-4 py-2.5 font-mono text-slate-500 text-xs">${s.ip_address || '-'}</td>
            <td class="px-4 py-2.5 font-mono text-slate-500 text-xs">${formatBytes(s.bytes_sent)} / ${formatBytes(s.bytes_recv)}</td>
        </tr>
    `).join('');

    document.getElementById('totalInfo').textContent = `${data.total} sessions total`;
    document.getElementById('prevBtn').disabled = page === 0;
    document.getElementById('nextBtn').disabled = (page + 1) * limit >= data.total;
}

function prevPage() { if (page > 0) { page--; loadSessions(); } }
function nextPage() { page++; loadSessions(); }

loadSessions();
</script>
{% endblock %}
