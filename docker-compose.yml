services:
  db:
    image: postgres:16-alpine
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-castaway}
      POSTGRES_USER: ${POSTGRES_USER:-castaway}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-castaway}"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  castaway:
    build: ./backend
    container_name: castaway
    ports:
      - "${PORT:-8000}:8000"
    volumes:
      - ./data:/data
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-castaway}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-castaway}
      DATA_DIR: /data
      SECRET_KEY: ${SECRET_KEY:-}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
